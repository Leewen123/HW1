name: CI/CD Docker Build and Push

on:
  push:
    branches:
      - main
    # Only trigger the build if files in the application folder or this workflow change
    paths:
      - "age_api/**"
      - ".github/workflows/ci.yml"

jobs:
  build_and_push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the GitHub repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (allows for advanced build caching and multi-platform builds if needed later)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log into Docker Hub using secrets configured in GitHub
      # Note: Ensure you have added DOCKERHUBUSERNAME and DOCKERHUBTOKEN in your GitHub Repository Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUBUSERNAME }}
          password: ${{ secrets.DOCKERHUBTOKEN }}

      # Step 4: Build and Push the Docker Image
      # We utilize Docker Buildx cache to significantly speed up successive builds
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./age_api
          file: ./age_api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUBUSERNAME }}/age-prediction-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUBUSERNAME }}/age-prediction-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUBUSERNAME }}/age-prediction-api:buildcache,mode=max

  deploy_local:
    name: Deploy to Local Machine
    needs: build_and_push
    runs-on: self-hosted

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUBUSERNAME }}
          password: ${{ secrets.DOCKERHUBTOKEN }}

      - name: Pull and Run the Docker Image
        shell: bash
        run: |
          echo "Pulling the latest image from Docker Hub..."
          sudo docker pull ${{ secrets.DOCKERHUBUSERNAME }}/age-prediction-api:latest

          echo "Stopping existing container if running..."
          sudo docker stop age-api-container || true
          sudo docker rm age-api-container || true

          echo "Starting the new container..."
          sudo docker run -d -p 8000:8000 --name age-api-container --restart unless-stopped ${{ secrets.DOCKERHUBUSERNAME }}/age-prediction-api:latest
