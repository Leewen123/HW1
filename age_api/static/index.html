<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Age Predictor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1a0b2e, #050608 60%);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(20, 22, 35, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(0, 242, 254, 0.15);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0, 242, 254, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Subtle glow light behind the container */
        .container::before {
            content: "";
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: rgba(0, 242, 254, 0.3);
            filter: blur(80px);
            z-index: -1;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 14px;
            color: #8bb6d1;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .image-upload-wrapper {
            position: relative;
            width: 100%;
            height: 250px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed rgba(79, 172, 254, 0.4);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-upload-wrapper:hover {
            transform: translateY(-2px);
            border-color: #00f2fe;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.15);
            background: rgba(255, 255, 255, 0.04);
        }

        .image-upload-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder-text {
            color: #608dbe;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        input[type="file"] {
            display: none;
        }

        .btn-predict {
            width: 100%;
            padding: 16px 0;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-predict:hover {
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.5);
            transform: translateY(-2px);
        }
        
        .btn-predict:active {
            transform: scale(0.97);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .result-box {
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 22px;
            display: none;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-age {
            color: #38ef7d;
            font-size: 34px;
            font-weight: 700;
            margin: 0 0 5px 0;
            text-shadow: 0 0 15px rgba(56, 239, 125, 0.4);
        }

        .result-meta {
            color: #8bb6d1;
            font-size: 13px;
            font-weight: 400;
            margin: 0;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Age Predictor</h1>
    <p class="subtitle">Upload a face, discover the age magic.</p>

    <div class="image-upload-wrapper" id="uploadWrapper">
        <span class="placeholder-text" id="placeholderText">Click to select image</span>
        <img id="previewImage" alt="Preview">
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <button class="btn-predict" id="predictBtn">
        <span id="btnText">Predict Age</span>
        <div class="spinner" id="btnSpinner"></div>
    </button>

    <div class="result-box" id="resultBox">
        <p class="result-age" id="resultAge">-- YO</p>
        <p class="result-meta">Estimated by OpenCV AI</p>
    </div>
</div>

<script>
    const uploadWrapper = document.getElementById('uploadWrapper');
    const fileInput = document.getElementById('fileInput');
    const previewImage = document.getElementById('previewImage');
    const placeholderText = document.getElementById('placeholderText');
    const predictBtn = document.getElementById('predictBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const resultBox = document.getElementById('resultBox');
    const resultAge = document.getElementById('resultAge');

    let selectedFile = null;

    uploadWrapper.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            selectedFile = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
                placeholderText.style.display = 'none';
                
                // Hide result box when evaluating new image
                resultBox.style.display = 'none';
            }
            reader.readAsDataURL(selectedFile);
        }
    });

    predictBtn.addEventListener('click', async () => {
        if (!selectedFile) {
            alert('Please upload an image first.');
            return;
        }

        // Switch button to loading state
        btnText.style.display = 'none';
        btnSpinner.style.display = 'block';
        resultBox.style.display = 'none';

        const formData = new FormData();
        formData.append('file', selectedFile);

        try {
            const response = await fetch('/predict/age', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            
            if (response.ok) {
                if (data.prediction && data.prediction.error) {
                    alert(data.prediction.error);
                } else {
                    // Extract and format the predicted age string
                    const ageRange = data.prediction.age_range.replace(/[()]/g, ''); 
                    resultAge.textContent = `${ageRange} YO`;
                    resultBox.style.display = 'block';
                }
            } else {
                alert(data.detail || 'An error occurred during prediction.');
            }
        } catch (error) {
            alert('Failed to connect to the server.');
        } finally {
            // Restore button to original state
            btnText.style.display = 'block';
            btnSpinner.style.display = 'none';
        }
    });

</script>

</body>
</html>
